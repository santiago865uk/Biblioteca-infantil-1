<!DOCTYPE html>
<html lang="es">
<head>
  <script>
    // Aplica el tema guardado ANTES de pintar la página, para evitar
    // un parpadeo del tema incorrecto (ver js/tema.js para la versión completa).
    (function () {
      var tema = localStorage.getItem('biblioteca-infantil-tema');
      if (!tema) {
        tema = window.matchMedia('(prefers-color-scheme: light)').matches ? 'claro' : 'oscuro';
      }
      document.documentElement.setAttribute('data-tema', tema);
    })();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leyendo... — Biblioteca Infantil</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link href="css/estilos.css" rel="stylesheet">
</head>
<body>

  <!-- Fondo que se tiñe dinámicamente con el color dominante de la portada
       del libro (ver extraerColorDominante en js/pages/libro.js). Vive
       detrás de #fondo-blobs y de todo el contenido. -->
  <div id="fondo-color-libro"></div>

  <div id="navbar"></div>

  <main class="container py-4">
  <div class="barra-volver">
    <button class="btn-volver" onclick="volverAtras('biblioteca.html')">
      <i class="bi bi-arrow-left"></i> Volver a la biblioteca
    </button>
  </div>

    <div id="spinner-carga" class="spinner-carga">
      <div class="spinner-border text-primary" role="status"></div>
    </div>

    <div id="contenido-libro" class="d-none">
      <div class="row g-4">

        <!-- Columna de información del libro -->
        <div class="col-lg-4">
          <div class="card tarjeta-libro p-3">
            <img id="img-portada" src="" alt="Portada" class="img-fluid rounded mb-3"
                 onerror="this.src='images/portada-default.svg'">
            <h1 id="titulo-libro" class="h5 mb-1"></h1>
            <p id="autor-libro" class="text-muted mb-2"></p>
            <span id="badge-categoria" class="badge mb-2" style="width: fit-content;"></span>
            <p id="edad-libro" class="small text-muted mb-3"></p>
            <p id="descripcion-libro" class="small mb-3"></p>

            <button id="btn-favorito" class="btn btn-outline-primary mb-2">
              <i class="bi bi-heart" id="icono-favorito"></i> <span id="texto-favorito">Agregar a favoritos</span>
            </button>

            <div id="seccion-progreso" class="small text-muted mb-2 d-none">
              Progreso: <span id="texto-progreso">0%</span>
              <div class="progress" style="height: 6px;">
                <div id="barra-progreso" class="progress-bar" style="width: 0%"></div>
              </div>
            </div>

            <hr>

            <h2 class="h6">Marcadores</h2>
            <div class="input-group input-group-sm mb-2">
              <input type="number" id="input-pagina-marcador" class="form-control" placeholder="Nº de página" min="1">
              <button id="btn-agregar-marcador" class="btn btn-outline-secondary">Marcar</button>
            </div>
            <ul id="lista-marcadores" class="list-group list-group-flush small"></ul>
          </div>
        </div>

        <!-- Columna del lector de PDF -->
        <div class="col-lg-8">
          <div class="card tarjeta-libro p-3">
            <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
              <div class="btn-group">
                <button id="btn-pagina-anterior" class="btn btn-outline-primary btn-sm"><i class="bi bi-arrow-left"></i> Anterior</button>
                <button id="btn-pagina-siguiente" class="btn btn-outline-primary btn-sm">Siguiente <i class="bi bi-arrow-right"></i></button>
              </div>
              <span class="small text-muted">
                Página <span id="texto-pagina-actual">1</span> de <span id="texto-total-paginas">--</span>
              </span>
              <div class="btn-group">
                <button id="btn-zoom-menos" class="btn btn-outline-secondary btn-sm"><i class="bi bi-dash-lg"></i></button>
                <button id="btn-zoom-mas" class="btn btn-outline-secondary btn-sm"><i class="bi bi-plus-lg"></i></button>
              </div>
            </div>
            <div id="contenedor-pdf" class="text-center overflow-auto" style="max-height: 75vh;">
              <canvas id="canvas-pdf" class="border rounded shadow-sm"></canvas>
            </div>
          </div>
        </div>

      </div>
    </div>

    <div id="mensaje-error" class="alert alert-danger d-none">
      No pudimos encontrar este libro.
      <a href="biblioteca.html">Volver a la biblioteca</a>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- PDF.js: librería de Mozilla para renderizar PDFs en un <canvas>.
       Se carga localmente (no desde un CDN) para evitar bloqueos de
       extensiones de privacidad/adblock, y como módulo ES porque PDF.js 4.x
       ya no distribuye una versión clásica con variable global. -->
  <script type="module" src="js/vendor/pdfjs/puente-pdfjs.js"></script>
  <script src="js/tema.js"></script>
  <script src="js/navegacion.js"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/proteger-ruta.js"></script>
  <script src="js/navbar.js"></script>
  <script src="js/efectos-visuales.js"></script>
  <script src="js/datos.js"></script>
  <script src="js/pages/libro.js"></script>
  <script>
    cargarNavbar('')
    protegerRuta()
  </script>
</body>
</html>
