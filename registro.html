<!DOCTYPE html>
<html lang="es">
<head>
  <script>
    // Aplica el tema guardado ANTES de pintar la página, para evitar
    // un parpadeo del tema incorrecto (ver js/tema.js para la versión completa).
    (function () {
      var tema = localStorage.getItem('biblioteca-infantil-tema');
      if (!tema) {
        tema = window.matchMedia('(prefers-color-scheme: light)').matches ? 'claro' : 'oscuro';
      }
      document.documentElement.setAttribute('data-tema', tema);
    })();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crear cuenta — Biblioteca Infantil</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link href="css/estilos.css" rel="stylesheet">
</head>
<body>

  <div id="navbar"></div>

  <main class="container py-5" style="max-width: 460px;">
  <div class="barra-volver">
    <button class="btn-volver" onclick="volverAtras('login.html')">
      <i class="bi bi-arrow-left"></i> Volver al inicio de sesión
    </button>
  </div>
    <div class="card tarjeta-libro p-4">
      <h1 class="h3 text-center mb-4">Crear una cuenta</h1>

      <div id="alerta-error" class="alert alert-danger d-none" role="alert"></div>
      <div id="alerta-exito" class="alert alert-success d-none" role="alert"></div>

      <form id="form-registro">
        <div class="mb-3">
          <label for="nombre" class="form-label">Nombre completo</label>
          <input type="text" class="form-control" id="nombre" required>
        </div>
        <div class="mb-3">
          <label for="email" class="form-label">Correo electrónico</label>
          <input type="email" class="form-control" id="email" required>
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">Contraseña</label>
          <input type="password" class="form-control" id="password" minlength="6" required>
          <div class="form-text">Mínimo 6 caracteres.</div>
        </div>
        <div class="mb-3">
          <label for="password-confirmar" class="form-label">Confirmar contraseña</label>
          <input type="password" class="form-control" id="password-confirmar" minlength="6" required>
        </div>
        <button type="submit" class="btn btn-primary w-100" id="btn-registro">
          Crear cuenta
        </button>
      </form>

      <hr>
      <p class="text-center small mb-0">
        ¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a>
      </p>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/tema.js"></script>
  <script src="js/navegacion.js"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/navbar.js"></script>
  <script src="js/efectos-visuales.js"></script>
  <script src="js/pages/registro.js"></script>
  <script>
    cargarNavbar('')
  </script>
</body>
</html>
