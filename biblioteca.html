<!DOCTYPE html>
<html lang="es">
<head>
  <script>
    // Aplica el tema guardado ANTES de pintar la página, para evitar
    // un parpadeo del tema incorrecto (ver js/tema.js para la versión completa).
    (function () {
      var tema = localStorage.getItem('biblioteca-infantil-tema');
      if (!tema) {
        tema = window.matchMedia('(prefers-color-scheme: light)').matches ? 'claro' : 'oscuro';
      }
      document.documentElement.setAttribute('data-tema', tema);
    })();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Biblioteca — Biblioteca Infantil</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link href="css/estilos.css" rel="stylesheet">
</head>
<body>

  <div id="navbar"></div>

  <main class="container py-4">
    <h1 class="h3 mb-4">Explora la biblioteca</h1>

    <div class="card tarjeta-libro p-3 mb-4">
      <div class="row g-2 align-items-end">
        <div class="col-md-4">
          <label class="form-label small mb-1">Buscar por título o autor</label>
          <input type="text" id="filtro-busqueda" class="form-control" placeholder="Ej: Fábulas, Esopo...">
        </div>
        <div class="col-md-3">
          <label class="form-label small mb-1">Categoría</label>
          <select id="filtro-categoria" class="form-select">
            <option value="">Todas</option>
          </select>
        </div>
        <div class="col-md-3">
          <label class="form-label small mb-1">Edad recomendada</label>
          <select id="filtro-edad" class="form-select">
            <option value="">Todas</option>
            <option value="3-5">3 a 5 años</option>
            <option value="6-8">6 a 8 años</option>
            <option value="9-12">9 a 12 años</option>
            <option value="13+">13 años o más</option>
          </select>
        </div>
        <div class="col-md-2">
          <button id="btn-limpiar-filtros" class="btn btn-outline-secondary w-100">
            Limpiar
          </button>
        </div>
      </div>
    </div>

    <div id="seccion-destacados" class="mb-5 d-none">
      <h2 class="h5 mb-3"><i class="bi bi-stars"></i> Destacados</h2>
      <div id="contenedor-destacados" class="row g-3"></div>
    </div>

    <h2 class="h5 mb-3">Catálogo completo</h2>
    <div id="spinner-carga" class="spinner-carga">
      <div class="spinner-border text-primary" role="status"></div>
    </div>
    <div id="contenedor-libros" class="row g-3"></div>
    <div id="mensaje-sin-resultados" class="alert alert-secondary text-center d-none">
      No encontramos libros con esos filtros. Intenta con otra búsqueda.
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/tema.js"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/proteger-ruta.js"></script>
  <script src="js/navbar.js"></script>
  <script src="js/efectos-visuales.js"></script>
  <script src="js/datos.js"></script>
  <script src="js/pages/biblioteca.js"></script>
  <script>
    cargarNavbar('')
    protegerRuta()
  </script>
</body>
</html>
