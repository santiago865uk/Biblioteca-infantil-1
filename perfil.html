<!DOCTYPE html>
<html lang="es">
<head>
  <script>
    // Aplica el tema guardado ANTES de pintar la página, para evitar
    // un parpadeo del tema incorrecto (ver js/tema.js para la versión completa).
    (function () {
      var tema = localStorage.getItem('biblioteca-infantil-tema');
      if (!tema) {
        tema = window.matchMedia('(prefers-color-scheme: light)').matches ? 'claro' : 'oscuro';
      }
      document.documentElement.setAttribute('data-tema', tema);
    })();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi perfil — Biblioteca Infantil</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link href="css/estilos.css" rel="stylesheet">
</head>
<body>

  <div id="navbar"></div>

  <main class="container py-4">
  <div class="barra-volver">
    <button class="btn-volver" onclick="volverAtras('biblioteca.html')">
      <i class="bi bi-arrow-left"></i> Volver
    </button>
  </div>
    <div class="row g-4">

      <!-- Datos del perfil -->
      <div class="col-md-4">
        <div class="card tarjeta-libro p-4">
          <h1 class="h5 mb-3">Mi perfil</h1>

          <div id="alerta-exito" class="alert alert-success d-none small"></div>

          <form id="form-perfil">
            <div class="mb-3">
              <label class="form-label small">Nombre completo</label>
              <input type="text" id="nombre-completo" class="form-control">
            </div>
            <div class="mb-3">
              <label class="form-label small">Nombre de usuario</label>
              <input type="text" id="nombre-usuario" class="form-control">
            </div>
            <div class="mb-3">
              <label class="form-label small">Correo electrónico</label>
              <input type="email" id="email" class="form-control" disabled>
            </div>
            <div class="mb-3">
              <label class="form-label small">Fecha de nacimiento</label>
              <input type="date" id="fecha-nacimiento" class="form-control">
            </div>
            <button type="submit" class="btn btn-primary w-100">Guardar cambios</button>
          </form>
        </div>
      </div>

      <!-- Historial de lectura -->
      <div class="col-md-8">
        <h2 class="h5 mb-3"><i class="bi bi-book-half"></i> Continuar leyendo</h2>
        <div id="spinner-carga" class="spinner-carga">
          <div class="spinner-border text-primary" role="status"></div>
        </div>
        <div id="contenedor-historial" class="row g-3"></div>
        <div id="mensaje-sin-historial" class="alert alert-secondary text-center d-none">
          Aún no has empezado a leer ningún libro. <a href="biblioteca.html">Explora la biblioteca</a>.
        </div>
      </div>

    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/tema.js"></script>
  <script src="js/navegacion.js"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/proteger-ruta.js"></script>
  <script src="js/navbar.js"></script>
  <script src="js/efectos-visuales.js"></script>
  <script src="js/datos.js"></script>
  <script src="js/pages/perfil.js"></script>
  <script>
    cargarNavbar('')
    protegerRuta()
  </script>
</body>
</html>
