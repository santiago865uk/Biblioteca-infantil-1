<!DOCTYPE html>
<html lang="es">
<head>
  <script>
    // Aplica el tema guardado ANTES de pintar la página, para evitar
    // un parpadeo del tema incorrecto (ver js/tema.js para la versión completa).
    (function () {
      var tema = localStorage.getItem('biblioteca-infantil-tema');
      if (!tema) {
        tema = window.matchMedia('(prefers-color-scheme: light)').matches ? 'claro' : 'oscuro';
      }
      document.documentElement.setAttribute('data-tema', tema);
    })();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel de administrador — Biblioteca Infantil</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link href="../css/estilos.css" rel="stylesheet">
</head>
<body>

  <div id="navbar"></div>

  <main class="container py-4">
  <div class="barra-volver">
    <button class="btn-volver" onclick="volverAtras('../biblioteca.html')">
      <i class="bi bi-arrow-left"></i> Volver a la biblioteca
    </button>
  </div>
    <h1 class="h3 mb-4"><i class="bi bi-gear-fill"></i> Panel de administrador</h1>

    <!-- Tarjetas de navegación a las secciones -->
    <div class="row g-3 mb-4">
      <div class="col-sm-6 col-md-3">
        <a href="libros.html" class="text-decoration-none">
          <div class="card tarjeta-libro p-4 text-center h-100">
            <div class="fs-1 mb-2"><i class="bi bi-journals"></i></div>
            <h2 class="h6 mb-0">Libros</h2>
          </div>
        </a>
      </div>
      <div class="col-sm-6 col-md-3">
        <a href="categorias.html" class="text-decoration-none">
          <div class="card tarjeta-libro p-4 text-center h-100">
            <div class="fs-1 mb-2"><i class="bi bi-tag-fill"></i></div>
            <h2 class="h6 mb-0">Categorías</h2>
          </div>
        </a>
      </div>
      <div class="col-sm-6 col-md-3">
        <a href="usuarios.html" class="text-decoration-none">
          <div class="card tarjeta-libro p-4 text-center h-100">
            <div class="fs-1 mb-2"><i class="bi bi-people-fill"></i></div>
            <h2 class="h6 mb-0">Usuarios</h2>
          </div>
        </a>
      </div>
      <div class="col-sm-6 col-md-3">
        <a href="../biblioteca.html" class="text-decoration-none">
          <div class="card tarjeta-libro p-4 text-center h-100">
            <div class="fs-1 mb-2"><i class="bi bi-eye-fill"></i></div>
            <h2 class="h6 mb-0">Ver biblioteca</h2>
          </div>
        </a>
      </div>
    </div>

    <!-- Estadísticas rápidas -->
    <div class="row g-3" id="contenedor-estadisticas">
      <div class="spinner-carga"><div class="spinner-border text-primary" role="status"></div></div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/tema.js"></script>
  <script src="../js/navegacion.js"></script>
  <script src="../js/supabase-config.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/proteger-ruta.js"></script>
  <script src="../js/navbar.js"></script>
  <script src="../js/efectos-visuales.js"></script>
  <script src="../js/datos.js"></script>
  <script src="../js/pages/admin/dashboard.js"></script>
  <script>
    cargarNavbar('../')
    protegerRutaAdmin()
  </script>
</body>
</html>
