<!DOCTYPE html>
<html lang="es">
<head>
  <script>
    // Aplica el tema guardado ANTES de pintar la página, para evitar
    // un parpadeo del tema incorrecto (ver js/tema.js para la versión completa).
    (function () {
      var tema = localStorage.getItem('biblioteca-infantil-tema');
      if (!tema) {
        tema = window.matchMedia('(prefers-color-scheme: light)').matches ? 'claro' : 'oscuro';
      }
      document.documentElement.setAttribute('data-tema', tema);
    })();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Administrar categorías — Biblioteca Infantil</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link href="../css/estilos.css" rel="stylesheet">
</head>
<body>

  <div id="navbar"></div>

  <main class="container py-4">
  <div class="barra-volver">
    <button class="btn-volver" onclick="volverAtras('index.html')">
      <i class="bi bi-arrow-left"></i> Panel de administrador
    </button>
  </div>
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
      <h1 class="h3 mb-0"><i class="bi bi-tag-fill"></i> Administrar categorías</h1>
      <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modal-categoria" id="btn-nueva-categoria">
        + Agregar categoría
      </button>
    </div>

    <div id="alerta-resultado" class="alert d-none"></div>

    <div id="spinner-carga" class="spinner-carga">
      <div class="spinner-border text-primary" role="status"></div>
    </div>

    <div class="row g-3" id="contenedor-categorias"></div>
  </main>

  <!-- Modal: crear/editar categoría -->
  <div class="modal fade" id="modal-categoria" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <form id="form-categoria">
          <div class="modal-header">
            <h2 class="modal-title h5" id="titulo-modal-categoria">Agregar categoría</h2>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <input type="hidden" id="categoria-id">
            <div id="alerta-error-modal" class="alert alert-danger d-none small"></div>

            <div class="mb-3">
              <label class="form-label small">Nombre *</label>
              <input type="text" id="campo-nombre" class="form-control" required>
            </div>
            <div class="mb-3">
              <label class="form-label small">Descripción</label>
              <textarea id="campo-descripcion" class="form-control" rows="2"></textarea>
            </div>
            <div class="mb-3">
              <label class="form-label small">Color</label>
              <input type="color" id="campo-color" class="form-control form-control-color" value="#6366f1">
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
            <button type="submit" class="btn btn-primary" id="btn-guardar-categoria">Guardar</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Modal: confirmación de acciones (reemplaza confirm() nativo del navegador) -->
  <div class="modal fade" id="modal-confirmar" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h2 class="modal-title h5" id="titulo-modal-confirmar">Confirmar acción</h2>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <p id="mensaje-modal-confirmar" class="mb-0"></p>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" class="btn btn-danger" id="btn-confirmar-accion">Sí, continuar</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/tema.js"></script>
  <script src="../js/navegacion.js"></script>
  <script src="../js/supabase-config.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/proteger-ruta.js"></script>
  <script src="../js/navbar.js"></script>
  <script src="../js/efectos-visuales.js"></script>
  <script src="../js/datos.js"></script>
  <script src="../js/datos-admin.js"></script>
  <script src="../js/confirmar-modal.js"></script>
  <script src="../js/pages/admin/categorias.js"></script>
  <script>
    cargarNavbar('../')
    protegerRutaAdmin()
  </script>
</body>
</html>
