<!DOCTYPE html>
<html lang="es">
<head>
  <script>
    // Aplica el tema guardado ANTES de pintar la página, para evitar
    // un parpadeo del tema incorrecto (ver js/tema.js para la versión completa).
    (function () {
      var tema = localStorage.getItem('biblioteca-infantil-tema');
      if (!tema) {
        tema = window.matchMedia('(prefers-color-scheme: light)').matches ? 'claro' : 'oscuro';
      }
      document.documentElement.setAttribute('data-tema', tema);
    })();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Administrar libros — Biblioteca Infantil</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link href="../css/estilos.css" rel="stylesheet">
</head>
<body>

  <div id="navbar"></div>

  <main class="container py-4">
  <div class="barra-volver">
    <button class="btn-volver" onclick="volverAtras('index.html')">
      <i class="bi bi-arrow-left"></i> Panel de administrador
    </button>
  </div>
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
      <h1 class="h3 mb-0"><i class="bi bi-journals"></i> Administrar libros</h1>
      <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modal-libro" id="btn-nuevo-libro">
        + Agregar libro
      </button>
    </div>

    <div id="alerta-resultado" class="alert d-none"></div>

    <div id="spinner-carga" class="spinner-carga">
      <div class="spinner-border text-primary" role="status"></div>
    </div>

    <div class="table-responsive">
      <table class="table table-hover align-middle bg-white rounded shadow-sm">
        <thead>
          <tr>
            <th>Portada</th>
            <th>Título</th>
            <th>Autor</th>
            <th>Categoría</th>
            <th>Edad</th>
            <th>Publicado</th>
            <th>Destacado</th>
            <th class="text-end">Acciones</th>
          </tr>
        </thead>
        <tbody id="tabla-libros"></tbody>
      </table>
    </div>
  </main>

  <!-- Modal: crear/editar libro -->
  <div class="modal fade" id="modal-libro" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <form id="form-libro">
          <div class="modal-header">
            <h2 class="modal-title h5" id="titulo-modal-libro">Agregar libro</h2>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <input type="hidden" id="libro-id">

            <div id="alerta-error-modal" class="alert alert-danger d-none small"></div>

            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label small">Título *</label>
                <input type="text" id="campo-titulo" class="form-control" required>
              </div>
              <div class="col-md-6">
                <label class="form-label small">Autor *</label>
                <input type="text" id="campo-autor" class="form-control" required>
              </div>

              <div class="col-md-6">
                <label class="form-label small">Categoría</label>
                <select id="campo-categoria" class="form-select"></select>
              </div>
              <div class="col-md-6">
                <label class="form-label small">Edad recomendada *</label>
                <select id="campo-edad" class="form-select" required>
                  <option value="3-5">3 a 5 años</option>
                  <option value="6-8" selected>6 a 8 años</option>
                  <option value="9-12">9 a 12 años</option>
                  <option value="13+">13 años o más</option>
                </select>
              </div>

              <div class="col-12">
                <label class="form-label small">Descripción</label>
                <textarea id="campo-descripcion" class="form-control" rows="2"></textarea>
              </div>

              <div class="col-md-6">
                <label class="form-label small">Fuente de dominio público</label>
                <input type="text" id="campo-fuente" class="form-control" placeholder="Ej: Project Gutenberg">
              </div>
              <div class="col-md-6">
                <label class="form-label small">Año de publicación original</label>
                <input type="number" id="campo-anio" class="form-control" placeholder="Ej: 1894">
              </div>

              <div class="col-md-6">
                <label class="form-label small">Portada (imagen)</label>
                <input type="file" id="campo-archivo-portada" class="form-control" accept="image/png,image/jpeg,image/webp">
                <input type="hidden" id="campo-portada-url">
                <div class="form-text">Déjalo en blanco si vas a editar y no quieres cambiar la portada actual.</div>
              </div>
              <div class="col-md-6">
                <label class="form-label small">Archivo PDF *</label>
                <input type="file" id="campo-archivo-pdf" class="form-control" accept="application/pdf">
                <input type="hidden" id="campo-pdf-url">
                <div class="form-text">Obligatorio al crear un libro nuevo.</div>
              </div>

              <div class="col-md-6 form-check ms-2">
                <input type="checkbox" class="form-check-input" id="campo-publicado" checked>
                <label class="form-check-label" for="campo-publicado">Publicado (visible en la biblioteca)</label>
              </div>
              <div class="col-md-6 form-check ms-2">
                <input type="checkbox" class="form-check-input" id="campo-destacado">
                <label class="form-check-label" for="campo-destacado">Destacado</label>
              </div>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
            <button type="submit" class="btn btn-primary" id="btn-guardar-libro">Guardar</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Modal: confirmación de acciones (reemplaza confirm() nativo del navegador) -->
  <div class="modal fade" id="modal-confirmar" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h2 class="modal-title h5" id="titulo-modal-confirmar">Confirmar acción</h2>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <p id="mensaje-modal-confirmar" class="mb-0"></p>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" class="btn btn-danger" id="btn-confirmar-accion">Sí, continuar</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/tema.js"></script>
  <script src="../js/navegacion.js"></script>
  <script src="../js/supabase-config.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/proteger-ruta.js"></script>
  <script src="../js/navbar.js"></script>
  <script src="../js/efectos-visuales.js"></script>
  <script src="../js/datos.js"></script>
  <script src="../js/datos-admin.js"></script>
  <script src="../js/confirmar-modal.js"></script>
  <script src="../js/pages/admin/libros.js"></script>
  <script>
    cargarNavbar('../')
    protegerRutaAdmin()
  </script>
</body>
</html>
