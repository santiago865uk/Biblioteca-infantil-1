<!DOCTYPE html>
<html lang="es">
<head>
  <script>
    // Aplica el tema guardado ANTES de pintar la página, para evitar
    // un parpadeo del tema incorrecto (ver js/tema.js para la versión completa).
    (function () {
      var tema = localStorage.getItem('biblioteca-infantil-tema');
      if (!tema) {
        tema = window.matchMedia('(prefers-color-scheme: light)').matches ? 'claro' : 'oscuro';
      }
      document.documentElement.setAttribute('data-tema', tema);
    })();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Administrar usuarios — Biblioteca Infantil</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link href="../css/estilos.css" rel="stylesheet">
</head>
<body>

  <div id="navbar"></div>

  <main class="container py-4">
  <div class="barra-volver">
    <button class="btn-volver" onclick="volverAtras('index.html')">
      <i class="bi bi-arrow-left"></i> Panel de administrador
    </button>
  </div>
    <h1 class="h3 mb-4"><i class="bi bi-people-fill"></i> Administrar usuarios</h1>

    <div id="alerta-resultado" class="alert d-none"></div>

    <div id="spinner-carga" class="spinner-carga">
      <div class="spinner-border text-primary" role="status"></div>
    </div>

    <div class="table-responsive">
      <table class="table table-hover align-middle bg-white rounded shadow-sm">
        <thead>
          <tr>
            <th>Nombre</th>
            <th>Correo</th>
            <th>Rol</th>
            <th>Registrado el</th>
            <th class="text-end">Acciones</th>
          </tr>
        </thead>
        <tbody id="tabla-usuarios"></tbody>
      </table>
    </div>
  </main>

  <!-- Modal: confirmación de acciones (reemplaza confirm() nativo del navegador) -->
  <div class="modal fade" id="modal-confirmar" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h2 class="modal-title h5" id="titulo-modal-confirmar">Confirmar acción</h2>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <p id="mensaje-modal-confirmar" class="mb-0"></p>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" class="btn btn-danger" id="btn-confirmar-accion">Sí, continuar</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/tema.js"></script>
  <script src="../js/navegacion.js"></script>
  <script src="../js/supabase-config.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/proteger-ruta.js"></script>
  <script src="../js/navbar.js"></script>
  <script src="../js/efectos-visuales.js"></script>
  <script src="../js/datos.js"></script>
  <script src="../js/datos-admin.js"></script>
  <script src="../js/confirmar-modal.js"></script>
  <script src="../js/pages/admin/usuarios.js"></script>
  <script>
    cargarNavbar('../')
    protegerRutaAdmin()
  </script>
</body>
</html>
