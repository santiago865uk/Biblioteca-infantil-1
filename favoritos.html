<!DOCTYPE html>
<html lang="es">
<head>
  <script>
    // Aplica el tema guardado ANTES de pintar la página, para evitar
    // un parpadeo del tema incorrecto (ver js/tema.js para la versión completa).
    (function () {
      var tema = localStorage.getItem('biblioteca-infantil-tema');
      if (!tema) {
        tema = window.matchMedia('(prefers-color-scheme: light)').matches ? 'claro' : 'oscuro';
      }
      document.documentElement.setAttribute('data-tema', tema);
    })();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis favoritos — Biblioteca Infantil</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link href="css/estilos.css" rel="stylesheet">
</head>
<body>

  <div id="navbar"></div>

  <main class="container py-4">
  <div class="barra-volver">
    <button class="btn-volver" onclick="volverAtras('biblioteca.html')">
      <i class="bi bi-arrow-left"></i> Volver a la biblioteca
    </button>
  </div>
    <h1 class="h3 mb-4"><i class="bi bi-heart-fill"></i> Mis libros favoritos</h1>

    <div id="spinner-carga" class="spinner-carga">
      <div class="spinner-border text-primary" role="status"></div>
    </div>
    <div id="contenedor-favoritos" class="row g-3"></div>
    <div id="mensaje-sin-favoritos" class="alert alert-secondary text-center d-none">
      Aún no tienes libros favoritos. <a href="biblioteca.html">Explora la biblioteca</a> y marca los que más te gusten.
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/tema.js"></script>
  <script src="js/navegacion.js"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/proteger-ruta.js"></script>
  <script src="js/navbar.js"></script>
  <script src="js/efectos-visuales.js"></script>
  <script src="js/datos.js"></script>
  <script src="js/pages/favoritos.js"></script>
  <script>
    cargarNavbar('')
    protegerRuta()
  </script>
</body>
</html>
